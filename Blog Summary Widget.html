<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Summary Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: transparent;
    }

    .widget-container {
      max-width: 100%;
    }

    /* Summary Button */
    .summary-trigger {
      background: white;
      border: 2px solid #E5E7EB;
      border-radius: 24px;
      padding: 10px 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      color: #374151;
      font-weight: 500;
    }

    .summary-trigger:hover {
      border-color: #017848;
      background: #F9FAFB;
    }

    .summary-trigger.active {
      border-color: #017848;
      background: #F0FDF4;
      color: #017848;
    }

    .trigger-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Collapsible Summary Card */
    .summary-card {
      background: white;
      border: 2px solid #E5E7EB;
      border-radius: 12px;
      margin-top: 16px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: all 0.3s ease;
    }

    .summary-card.expanded {
      max-height: 1000px;
      opacity: 1;
      margin-bottom: 20px;
    }

    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 2px solid #F3F4F6;
    }

    .summary-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    .ai-icon {
      width: 24px;
      height: 24px;
    }

    .collapse-button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #6B7280;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
    }

    .collapse-button:hover {
      color: #111827;
    }

    .collapse-button svg {
      width: 20px;
      height: 20px;
      transition: transform 0.2s;
    }

    .summary-card.expanded .collapse-button svg {
      transform: rotate(180deg);
    }

    /* Tabs */
    .tabs-container {
      display: flex;
      gap: 0;
      padding: 0 24px;
      background: #F9FAFB;
      border-bottom: 2px solid #E5E7EB;
    }

    .tab-button {
      background: none;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      color: #6B7280;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      position: relative;
      top: 2px;
    }

    .tab-button:hover {
      color: #374151;
    }

    .tab-button.active {
      color: #017848;
      border-bottom-color: #017848;
      background: white;
    }

    /* Tab Content */
    .tab-content {
      padding: 24px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .summary-text {
      font-size: 15px;
      line-height: 1.7;
      color: #374151;
    }

    .key-points-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .key-points-list li {
      font-size: 15px;
      line-height: 1.7;
      color: #374151;
      padding-left: 28px;
      margin-bottom: 12px;
      position: relative;
    }

    .key-points-list li:last-child {
      margin-bottom: 0;
    }

    .key-points-list li::before {
      content: '•';
      position: absolute;
      left: 12px;
      color: #017848;
      font-weight: bold;
      font-size: 18px;
    }

    /* Loading State */
    .loading-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #E5E7EB;
      border-radius: 50%;
      border-top-color: #017848;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-state {
      text-align: center;
      padding: 40px 24px;
      color: #6B7280;
    }

    /* Error State */
    .error-state {
      padding: 20px 24px;
      background: #FEF2F2;
      color: #991B1B;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Demo Notice */
    .demo-notice {
      padding: 12px 24px;
      background: #FEF3C7;
      border-bottom: 2px solid #FDE68A;
      font-size: 13px;
      color: #92400E;
      text-align: center;
    }

    @media (max-width: 640px) {
      .summary-header {
        padding: 16px 20px;
      }

      .summary-title {
        font-size: 16px;
      }

      .tab-content {
        padding: 20px;
      }

      .tabs-container {
        padding: 0 20px;
      }

      .tab-button {
        padding: 10px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="widget-container">
    <button id="summaryTrigger" class="summary-trigger">
      <span class="trigger-icon">✨</span>
      <span id="triggerText">Summarize with Better AI</span>
    </button>

    <div id="summaryCard" class="summary-card">
      <div class="summary-header">
        <h3 class="summary-title">
          <span class="ai-icon">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" fill="#017848"></path>
              <path d="M18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z" fill="#017848"></path>
            </svg>
          </span>
          Your article summary
        </h3>
        <button class="collapse-button" onclick="toggleSummary()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 9l-7 7-7-7"></path>
          </svg>
        </button>
      </div>

      <div class="demo-notice" id="demoNotice" style="display: none;">
        🔧 Demo Mode: Connect to Claude API for live summaries
      </div>

      <div class="tabs-container">
        <button class="tab-button active" onclick="switchTab(&#39;summary&#39;)">
          Summary
        </button>
        <button class="tab-button" onclick="switchTab(&#39;keypoints&#39;)">
          Key points
        </button>
      </div>

      <div class="tab-content" id="tabContent">
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          <p style="margin-top: 12px;">Generating summary...</p>
        </div>

        <div class="tab-panel" id="summaryPanel">
          <p class="summary-text" id="summaryText"></p>
        </div>

        <div class="tab-panel" id="keypointsPanel">
          <ul class="key-points-list" id="keypointsList"></ul>
        </div>

        <div class="error-state" id="errorState" style="display: none;">
          <strong>⚠ Error:</strong> <span id="errorMessage"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let isExpanded = false;
    let currentTab = 'summary';
    let summaryData = null;

    const summaryTrigger = document.getElementById('summaryTrigger');
    const triggerText = document.getElementById('triggerText');
    const summaryCard = document.getElementById('summaryCard');
    const loadingState = document.getElementById('loadingState');
    const summaryPanel = document.getElementById('summaryPanel');
    const keypointsPanel = document.getElementById('keypointsPanel');
    const errorState = document.getElementById('errorState');
    const demoNotice = document.getElementById('demoNotice');

    summaryTrigger.addEventListener('click', () => {
      if (!isExpanded) {
        openSummary();
      } else {
        closeSummary();
      }
    });

    async function openSummary() {
      isExpanded = true;
      summaryTrigger.classList.add('active');
      summaryCard.classList.add('expanded');
      
      if (!summaryData) {
        await generateSummary();
      }
    }

    function closeSummary() {
      isExpanded = false;
      summaryTrigger.classList.remove('active');
      summaryCard.classList.remove('expanded');
    }

    function toggleSummary() {
      if (isExpanded) {
        closeSummary();
      } else {
        openSummary();
      }
    }

    async function generateSummary() {
      showLoading();

      try {
        const blogContent = getParentPageContent();
        
        if (!blogContent || blogContent.length < 100) {
          throw new Error("Could not extract blog content from the page");
        }

        // Show demo notice
        demoNotice.style.display = 'block';

        // Simulate API delay for demo
        await new Promise(resolve => setTimeout(resolve, 1500));

        // Demo summary
        summaryData = {
          summary: "This is a demo summary. Once connected to Claude's API, this will automatically generate intelligent summaries of your blog posts based on the actual content. The summary will be concise, informative, and help readers quickly understand the main points of the article.",
          takeaways: [
            "The widget successfully detected your blog content",
            "Connect to Claude's API to enable real-time AI summarization",
            "The design matches Better's branding with clean, professional styling",
            "Tabs allow readers to switch between summary and key points",
            "Share setup instructions with your development team"
          ]
        };

        displaySummary();

      } catch (err) {
        console.error("Error:", err);
        showError(err.message || "Failed to generate summary");
      }
    }

    function showLoading() {
      loadingState.style.display = 'block';
      summaryPanel.style.display = 'none';
      keypointsPanel.style.display = 'none';
      errorState.style.display = 'none';
    }

    function displaySummary() {
      // Populate summary
      document.getElementById('summaryText').textContent = summaryData.summary;

      // Populate key points
      const keypointsList = document.getElementById('keypointsList');
      keypointsList.innerHTML = '';
      summaryData.takeaways.forEach(point => {
        const li = document.createElement('li');
        li.textContent = point;
        keypointsList.appendChild(li);
      });

      // Show content
      loadingState.style.display = 'none';
      showTab(currentTab);
    }

    function showError(message) {
      loadingState.style.display = 'none';
      summaryPanel.style.display = 'none';
      keypointsPanel.style.display = 'none';
      errorState.style.display = 'block';
      document.getElementById('errorMessage').textContent = message;
    }

    function switchTab(tab) {
      currentTab = tab;
      
      // Update tab buttons
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');

      // Show correct panel
      showTab(tab);
    }

    function showTab(tab) {
      summaryPanel.classList.remove('active');
      keypointsPanel.classList.remove('active');
      
      if (tab === 'summary') {
        summaryPanel.classList.add('active');
      } else {
        keypointsPanel.classList.add('active');
      }
    }

    function getParentPageContent() {
      try {
        if (window.parent && window.parent.document) {
          const parentDoc = window.parent.document;
          
          const selectors = [
            'article',
            '[class*="blog-content"]',
            '[class*="post-content"]',
            '[class*="article-content"]',
            '[data-builder-component="text"]',
            'main',
            '.content'
          ];

          for (const selector of selectors) {
            const element = parentDoc.querySelector(selector);
            if (element) {
              let text = element.innerText || element.textContent;
              text = text.replace(/\s+/g, ' ').trim();
              return text.substring(0, 8000);
            }
          }

          const bodyText = parentDoc.body.innerText;
          return bodyText ? bodyText.substring(0, 8000) : null;
        }
      } catch (e) {
        console.error("Cannot access parent window:", e);
      }

      return null;
    }

    // Make functions globally accessible
    window.toggleSummary = toggleSummary;
    window.switchTab = switchTab;
  </script>


</body></html>
